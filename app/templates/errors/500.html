{% extends 'base.html' %}

{% block title %}服务器错误 - {{ site_name }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-8 sm:px-6 lg:px-8">
    <div class="max-w-md w-full text-center">
        <!-- 魔法图标 -->
        <div class="mb-6 sm:mb-8">
            <div class="relative inline-block">
                <!-- 发光背景 -->
                <div class="absolute inset-0 bg-red-400 rounded-full blur-3xl opacity-20 animate-pulse"></div>
                <!-- 图标容器 -->
                <div class="relative w-24 h-24 sm:w-32 sm:h-32 mx-auto bg-gradient-to-br from-red-300 via-pink-400 to-magic-500 rounded-full flex items-center justify-center shadow-lg shadow-red-400/30">
                    <i class="ph ph-warning-circle text-4xl sm:text-5xl text-white"></i>
                </div>
                <!-- 装饰星星 -->
                <div class="absolute -top-2 -left-2 text-red-400 animate-bounce">
                    <i class="ph ph-lightning text-xl sm:text-2xl"></i>
                </div>
                <div class="absolute -bottom-1 -right-3 text-magic-400 animate-bounce" style="animation-delay: 0.2s;">
                    <i class="ph ph-warning text-lg sm:text-xl"></i>
                </div>
            </div>
        </div>

        <!-- 错误代码 -->
        <div class="mb-4 sm:mb-6">
            <h1 class="text-6xl sm:text-8xl font-bold bg-gradient-to-r from-red-500 via-pink-500 to-magic-500 bg-clip-text text-transparent tracking-tight">
                500
            </h1>
        </div>

        <!-- 错误信息 -->
        <div class="mb-6 sm:mb-8 space-y-2 sm:space-y-3">
            <h2 class="text-xl sm:text-2xl font-bold text-gray-800">
                服务器遇到魔法故障
            </h2>
            <p class="text-sm sm:text-base text-gray-600 px-2 sm:px-0">
                我们的魔法服务器暂时失去了法力，请稍后再试 🔮
            </p>
        </div>

        <!-- 建议操作 -->
        <div class="bg-white/60 backdrop-blur-sm rounded-2xl sm:rounded-3xl p-4 sm:p-6 mb-6 sm:mb-8 shadow-card">
            <div class="space-y-3">
                <div class="flex items-center space-x-3 text-left">
                    <div class="flex-shrink-0 w-8 h-8 sm:w-10 sm:h-10 bg-magic-100 rounded-full flex items-center justify-center">
                        <i class="ph ph-arrows-clockwise text-magic-600 text-sm sm:text-base"></i>
                    </div>
                    <p class="text-xs sm:text-sm text-gray-600">刷新页面尝试重新加载</p>
                </div>
                <div class="flex items-center space-x-3 text-left">
                    <div class="flex-shrink-0 w-8 h-8 sm:w-10 sm:h-10 bg-magic-100 rounded-full flex items-center justify-center">
                        <i class="ph ph-clock text-magic-600 text-sm sm:text-base"></i>
                    </div>
                    <p class="text-xs sm:text-sm text-gray-600">稍等片刻后再次访问</p>
                </div>
                <div class="flex items-center space-x-3 text-left">
                    <div class="flex-shrink-0 w-8 h-8 sm:w-10 sm:h-10 bg-magic-100 rounded-full flex items-center justify-center">
                        <i class="ph ph-envelope text-magic-600 text-sm sm:text-base"></i>
                    </div>
                    <p class="text-xs sm:text-sm text-gray-600">如问题持续，请联系管理员</p>
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 justify-center">
            <button onclick="location.reload()" 
                    class="inline-flex items-center justify-center px-6 py-3 sm:py-3.5 bg-gradient-to-r from-magic-500 to-magic-600 text-white font-medium rounded-xl sm:rounded-2xl shadow-lg shadow-magic-500/30 hover:shadow-xl hover:shadow-magic-500/40 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 text-sm sm:text-base">
                <i class="ph ph-arrows-clockwise mr-2 text-lg"></i>
                刷新页面
            </button>
            <a href="{{ url_for('user.dashboard') }}" 
               class="inline-flex items-center justify-center px-6 py-3 sm:py-3.5 bg-white text-magic-600 font-medium rounded-xl sm:rounded-2xl border-2 border-magic-200 hover:border-magic-300 hover:bg-magic-50 active:scale-[0.98] transition-all duration-200 text-sm sm:text-base">
                <i class="ph ph-house mr-2 text-lg"></i>
                返回首页
            </a>
        </div>

        <!-- 装饰元素 -->
        <div class="mt-8 sm:mt-12 flex justify-center space-x-2 text-magic-300">
            <i class="ph ph-gear text-xs sm:text-sm animate-spin" style="animation-duration: 3s;"></i>
            <i class="ph ph-lightning text-xs sm:text-sm animate-pulse" style="animation-delay: 0.3s;"></i>
            <i class="ph ph-gear text-xs sm:text-sm animate-spin" style="animation-duration: 4s; animation-delay: 0.5s;"></i>
        </div>

        <!-- 错误追踪信息 (仅开发环境显示) -->
        {% if config.DEBUG and error %}
        <div class="mt-6 sm:mt-8 p-3 sm:p-4 bg-red-50 rounded-xl text-left overflow-auto">
            <p class="text-xs font-mono text-red-600 break-all">{{ error }}</p>
        </div>
        {% endif %}
    </div>
</div>

<style>
/* 移动端优化 */
@media (max-width: 640px) {
    .error-container {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
    }
}

/* 动画效果 */
@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
}

.animate-float {
    animation: float 3s ease-in-out infinite;
}
</style>
{% endblock %}
