<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="theme-color" content="#6B4E7C">
    <title>用户管理 - {{ site_name }}</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="{{ url_for('static', filename='vendor/phosphor-icons/index.js') }}"></script>
    
    <!-- Mobile Mucha CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile-mucha.css') }}">
    
    <style>
        /* 用户管理特定样式 */
        .search-section {
            padding: var(--space-md);
            background: linear-gradient(135deg, var(--mucha-purple-dark) 0%, #4A3A5A 100%);
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: var(--space-md) var(--space-md) var(--space-md) 44px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 14px;
            background: rgba(255, 255, 255, 0.95);
        }
        
        .search-box i {
            position: absolute;
            left: var(--space-md);
            top: 50%;
            transform: translateY(-50%);
            color: var(--mucha-purple);
            font-size: 18px;
        }
        
        .filter-tabs {
            display: flex;
            gap: var(--space-sm);
            padding: var(--space-md);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            background: white;
            border-bottom: 1px solid var(--border-color);
        }
        
        .filter-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .filter-tab {
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-full);
            font-size: 13px;
            white-space: nowrap;
            background: var(--mucha-purple-light);
            color: var(--mucha-purple-dark);
            border: none;
            transition: all 0.3s ease;
        }
        
        .filter-tab.active {
            background: linear-gradient(135deg, var(--mucha-purple) 0%, var(--mucha-purple-dark) 100%);
            color: white;
        }
        
        .user-list {
            padding: var(--space-md);
        }
        
        .user-item {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-md);
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-md);
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-color);
        }
        
        .user-item .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--mucha-purple-light) 0%, var(--mucha-mint-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--mucha-purple-dark);
            flex-shrink: 0;
        }
        
        .user-item .user-info {
            flex: 1;
            min-width: 0;
        }
        
        .user-item .user-phone {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .user-item .user-meta {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .user-item .user-actions {
            display: flex;
            gap: var(--space-sm);
        }
        
        .user-item .action-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-full);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
        }
        
        .user-item .action-btn.edit {
            background: var(--mucha-mint-light);
            color: #4A8B6F;
        }
        
        .user-item .action-btn.delete {
            background: #F8D7DA;
            color: #721C24;
        }
        
        .user-item .action-btn:active {
            transform: scale(0.9);
        }
        
        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--space-xl);
            text-align: center;
        }
        
        .empty-state i {
            font-size: 64px;
            color: var(--mucha-purple-light);
            margin-bottom: var(--space-md);
        }
        
        .empty-state h3 {
            font-size: 16px;
            color: var(--text-secondary);
        }
        
        /* 添加按钮 */
        .fab-btn {
            position: fixed;
            bottom: calc(var(--space-xl) + env(safe-area-inset-bottom, 0));
            right: var(--space-lg);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--mucha-purple) 0%, var(--mucha-purple-dark) 100%);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(107, 78, 124, 0.4);
            z-index: 100;
            transition: all 0.3s ease;
        }
        
        .fab-btn:active {
            transform: scale(0.95);
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-card);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: var(--space-xl);
            animation: slideUp 0.3s ease-out;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-lg);
        }
        
        .modal-title {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 600;
            color: var(--mucha-purple-dark);
        }
        
        .modal-close {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--mucha-purple-light);
            border: none;
            color: var(--mucha-purple-dark);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .form-group {
            margin-bottom: var(--space-lg);
        }
        
        .form-label {
            display: block;
            margin-bottom: var(--space-sm);
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: var(--space-md);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 15px;
            background: white;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--mucha-purple);
        }
        
        .submit-btn {
            width: 100%;
            padding: var(--space-md);
            background: linear-gradient(135deg, var(--mucha-purple) 0%, var(--mucha-purple-dark) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-full);
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- 背景 -->
    <div class="mucha-bg"></div>
    
    <!-- 顶部导航 -->
    <nav class="mucha-navbar" style="background: transparent; border: none;">
        <a href="{{ url_for('mobile.mobile_admin_dashboard') }}" class="nav-back" style="background: rgba(255,255,255,0.2); color: white;">
            <i class="ph ph-arrow-left"></i>
        </a>
        <span class="nav-title" style="color: white;">
            <i class="ph ph-users"></i>
            用户管理
        </span>
        <div style="width: 40px;"></div>
    </nav>
    
    <!-- 主内容 -->
    <div class="mucha-content no-navbar no-bottom-nav">
        <!-- 搜索区域 -->
        <div class="search-section">
            <div class="search-box">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="搜索用户手机号..." onkeyup="handleSearch(event)">
            </div>
        </div>
        
        <!-- 筛选标签 -->
        <div class="filter-tabs hide-scrollbar">
            <button class="filter-tab active" onclick="filterUsers('all', this)">全部</button>
            <button class="filter-tab" onclick="filterUsers('active', this)">正常</button>
            <button class="filter-tab" onclick="filterUsers('locked', this)">锁定</button>
        </div>
        
        <!-- 用户列表 -->
        <div class="user-list" id="userList">
            {% if users %}
                {% for user in users %}
                <div class="user-item" data-status="{% if user.is_locked %}locked{% else %}active{% endif %}">
                    <div class="user-avatar">
                        <i class="ph ph-user"></i>
                    </div>
                    <div class="user-info">
                        <div class="user-phone">{{ user.phone }}</div>
                        <div class="user-meta">
                            <span>注册: {{ user.created_at.strftime('%Y-%m-%d') }}</span>
                            {% if user.is_locked %}
                            <span style="color: var(--danger);">已锁定</span>
                            {% endif %}
                        </div>
                    </div>
                    <div class="user-actions">
                        <button class="action-btn edit" onclick="editUser({{ user.id }})">
                            <i class="ph ph-pencil"></i>
                        </button>
                        <button class="action-btn delete" onclick="deleteUser({{ user.id }})">
                            <i class="ph ph-trash"></i>
                        </button>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <div class="empty-state">
                    <i class="ph ph-users"></i>
                    <h3>暂无用户</h3>
                </div>
            {% endif %}
        </div>
    </div>
    
    <!-- 添加按钮 -->
    <button class="fab-btn" onclick="showAddModal()">
        <i class="ph ph-plus"></i>
    </button>
    
    <!-- 添加用户模态框 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">添加用户</h2>
                <button class="modal-close" onclick="hideAddModal()">
                    <i class="ph ph-x"></i>
                </button>
            </div>
            <form onsubmit="return handleAddUser(event)">
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="form-input" id="newUserPhone" placeholder="请输入11位手机号" required maxlength="11">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="newUserPassword" placeholder="请输入密码" required minlength="6">
                </div>
                <button type="submit" class="submit-btn">确认添加</button>
            </form>
        </div>
    </div>
    
    <script>
        // 获取CSRF Token
        function getCsrfToken() {
            return document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
        }
        
        // 筛选用户
        function filterUsers(type, btn) {
            document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
            btn.classList.add('active');
            
            const items = document.querySelectorAll('.user-item');
            items.forEach(item => {
                if (type === 'all') {
                    item.style.display = 'flex';
                } else {
                    const status = item.getAttribute('data-status');
                    item.style.display = (status === type) ? 'flex' : 'none';
                }
            });
        }
        
        // 搜索用户
        function handleSearch(event) {
            if (event.key === 'Enter') {
                const keyword = event.target.value.trim();
                const items = document.querySelectorAll('.user-item');
                items.forEach(item => {
                    const phone = item.querySelector('.user-phone').textContent;
                    if (phone.includes(keyword)) {
                        item.style.display = 'flex';
                    } else {
                        item.style.display = 'none';
                    }
                });
            }
        }
        
        // 显示添加模态框
        function showAddModal() {
            document.getElementById('addModal').classList.add('show');
        }
        
        // 隐藏添加模态框
        function hideAddModal() {
            document.getElementById('addModal').classList.remove('show');
        }
        
        // 添加用户
        function handleAddUser(event) {
            event.preventDefault();
            const phone = document.getElementById('newUserPhone').value;
            const password = document.getElementById('newUserPassword').value;
            
            fetch('/admin/api/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCsrfToken()
                },
                body: JSON.stringify({ phone, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('添加成功');
                    location.reload();
                } else {
                    alert(data.message || '添加失败');
                }
            })
            .catch(error => {
                console.error('添加失败:', error);
                alert('添加失败，请重试');
            });
            
            return false;
        }
        
        // 编辑用户
        function editUser(userId) {
            window.location.href = '/admin/users/' + userId + '/edit';
        }
        
        // 删除用户
        function deleteUser(userId) {
            if (!confirm('确定要删除该用户吗？')) return;
            
            fetch('/admin/api/users/' + userId, {
                method: 'DELETE',
                headers: {
                    'X-CSRFToken': getCsrfToken()
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    location.reload();
                } else {
                    alert(data.message || '删除失败');
                }
            })
            .catch(error => {
                console.error('删除失败:', error);
                alert('删除失败，请重试');
            });
        }
        
        // 点击模态框背景关闭
        document.getElementById('addModal').addEventListener('click', function(e) {
            if (e.target === this) {
                hideAddModal();
            }
        });
    </script>
</body>
</html>
