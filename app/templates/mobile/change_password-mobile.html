<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="theme-color" content="#9B7CB6">
    <title>修改密码 - {{ site_name }}</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="{{ url_for('static', filename='vendor/phosphor-icons/index.js') }}"></script>
    
    <!-- Mobile Mucha CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile-mucha.css') }}">
    
    <style>
        /* 修改密码特定样式 */
        .profile-header {
            background: linear-gradient(135deg, var(--mucha-purple) 0%, var(--mucha-purple-dark) 100%);
            padding: var(--space-xl) var(--space-lg);
            padding-top: calc(var(--top-nav-height) + var(--space-lg));
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .profile-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.3) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-md);
            font-size: 36px;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }
        
        .profile-phone {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 600;
        }
        
        .profile-role {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 4px;
        }
        
        .form-section {
            padding: var(--space-lg);
        }
        
        .form-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-color);
        }
        
        .form-title {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 600;
            color: var(--mucha-purple-dark);
            margin-bottom: var(--space-lg);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }
        
        .form-title i {
            color: var(--mucha-gold);
        }
        
        .form-group {
            margin-bottom: var(--space-lg);
        }
        
        .form-label {
            display: block;
            margin-bottom: var(--space-sm);
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper i {
            position: absolute;
            left: var(--space-md);
            top: 50%;
            transform: translateY(-50%);
            color: var(--mucha-purple);
            font-size: 20px;
        }
        
        .form-input {
            width: 100%;
            padding: var(--space-md) var(--space-md) var(--space-md) 48px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 15px;
            background: white;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--mucha-purple);
            box-shadow: 0 0 0 4px rgba(155, 124, 182, 0.15);
        }
        
        .toggle-password {
            position: absolute;
            right: var(--space-md);
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 20px;
            background: none;
            border: none;
            padding: var(--space-sm);
        }
        
        .toggle-password:active {
            color: var(--mucha-purple);
        }
        
        .submit-btn {
            width: 100%;
            padding: var(--space-md);
            background: linear-gradient(135deg, var(--mucha-purple) 0%, var(--mucha-purple-dark) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-full);
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            box-shadow: 0 4px 15px rgba(107, 78, 124, 0.3);
            transition: all 0.3s ease;
        }
        
        .submit-btn:active {
            transform: scale(0.98);
        }
        
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .logout-btn {
            width: 100%;
            padding: var(--space-md);
            background: transparent;
            color: var(--danger);
            border: 2px solid var(--danger);
            border-radius: var(--radius-full);
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            margin-top: var(--space-lg);
            transition: all 0.3s ease;
        }
        
        .logout-btn:active {
            background: var(--danger);
            color: white;
        }
        
        /* 菜单列表 */
        .menu-list {
            padding: var(--space-md);
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-md);
            background: var(--bg-card);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-sm);
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }
        
        .menu-item:active {
            transform: scale(0.98);
            background: var(--mucha-purple-light);
        }
        
        .menu-item i:first-child {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: var(--mucha-purple-light);
            color: var(--mucha-purple-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .menu-item .menu-content {
            flex: 1;
        }
        
        .menu-item .menu-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .menu-item .menu-arrow {
            color: var(--text-muted);
            font-size: 20px;
        }
        
        /* Toast提示 */
        .toast {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(107, 78, 124, 0.95);
            color: white;
            padding: var(--space-md) var(--space-xl);
            border-radius: var(--radius-full);
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 10000;
            backdrop-filter: blur(10px);
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.success {
            background: rgba(74, 139, 111, 0.95);
        }
        
        .toast.error {
            background: rgba(212, 118, 118, 0.95);
        }
    </style>
</head>
<body>
    <!-- 背景 -->
    <div class="mucha-bg"></div>
    
    <!-- 顶部导航 -->
    <nav class="mucha-navbar" style="background: transparent; border: none;">
        <a href="{{ url_for('mobile.mobile_dashboard') }}" class="nav-back" style="background: rgba(255,255,255,0.2); color: white;">
            <i class="ph ph-arrow-left"></i>
        </a>
        <span class="nav-title" style="color: white;">
            <i class="ph ph-user"></i>
            个人中心
        </span>
        <div style="width: 40px;"></div>
    </nav>
    
    <!-- 主内容 -->
    <div class="mucha-content no-bottom-nav no-navbar">
        <!-- 个人信息头部 -->
        <div class="profile-header">
            <div class="profile-avatar">
                <i class="ph ph-user"></i>
            </div>
            <div class="profile-phone">{{ current_user.phone }}</div>
            <div class="profile-role">普通用户</div>
        </div>
        
        <!-- 快捷菜单 -->
        <div class="menu-list">
            <a href="{{ url_for('mobile.mobile_my_courses') }}" class="menu-item">
                <i class="ph ph-book-bookmark"></i>
                <div class="menu-content">
                    <div class="menu-title">我的课程</div>
                </div>
                <i class="ph ph-caret-right menu-arrow"></i>
            </a>
            <a href="{{ url_for('mobile.mobile_history') }}" class="menu-item">
                <i class="ph ph-clock-counter-clockwise"></i>
                <div class="menu-content">
                    <div class="menu-title">播放历史</div>
                </div>
                <i class="ph ph-caret-right menu-arrow"></i>
            </a>
        </div>
        
        <!-- 修改密码表单 -->
        <div class="form-section">
            <div class="form-card">
                <h2 class="form-title">
                    <i class="ph ph-key"></i>
                    修改密码
                </h2>
                
                <form id="passwordForm" onsubmit="return handleSubmit(event)">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="form-group">
                        <label class="form-label">当前密码</label>
                        <div class="input-wrapper">
                            <i class="ph ph-lock-key"></i>
                            <input type="password" id="currentPassword" name="current_password" class="form-input" placeholder="请输入当前密码" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('currentPassword', this)">
                                <i class="ph ph-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">新密码</label>
                        <div class="input-wrapper">
                            <i class="ph ph-lock-key-open"></i>
                            <input type="password" id="newPassword" name="new_password" class="form-input" placeholder="请输入新密码（至少6位）" required minlength="6">
                            <button type="button" class="toggle-password" onclick="togglePassword('newPassword', this)">
                                <i class="ph ph-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">确认新密码</label>
                        <div class="input-wrapper">
                            <i class="ph ph-check-circle"></i>
                            <input type="password" id="confirmPassword" name="confirm_password" class="form-input" placeholder="请再次输入新密码" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">
                                <i class="ph ph-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" class="submit-btn" id="submitBtn">
                        <i class="ph ph-check"></i>
                        确认修改
                    </button>
                </form>
                
                <button class="logout-btn" onclick="handleLogout()">
                    <i class="ph ph-sign-out"></i>
                    退出登录
                </button>
            </div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <nav class="mucha-bottom-nav">
        <a href="{{ url_for('mobile.mobile_dashboard') }}" class="nav-item">
            <i class="ph ph-house"></i>
            <span>首页</span>
        </a>
        <a href="{{ url_for('mobile.mobile_courses') }}" class="nav-item">
            <i class="ph ph-books"></i>
            <span>课程</span>
        </a>
        <a href="{{ url_for('mobile.mobile_my_courses') }}" class="nav-item">
            <i class="ph ph-book-bookmark"></i>
            <span>我的</span>
        </a>
        <a href="{{ url_for('mobile.mobile_history') }}" class="nav-item">
            <i class="ph ph-clock-counter-clockwise"></i>
            <span>历史</span>
        </a>
        <a href="{{ url_for('mobile.mobile_change_password') }}" class="nav-item active">
            <i class="ph ph-user"></i>
            <span>我的</span>
        </a>
    </nav>
    
    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>
    
    <script>
        // 显示Toast
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + (type || '');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        // 切换密码可见性
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('ph-eye');
                icon.classList.add('ph-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('ph-eye-slash');
                icon.classList.add('ph-eye');
            }
        }
        
        // 处理表单提交
        function handleSubmit(event) {
            event.preventDefault();
            
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            
            // 验证
            if (newPassword.length < 6) {
                showToast('新密码至少需要6位', 'error');
                return false;
            }
            
            if (newPassword !== confirmPassword) {
                showToast('两次输入的密码不一致', 'error');
                return false;
            }
            
            // 禁用按钮
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="loading-spinner" style="width: 20px; height: 20px; border-width: 2px;"></div><span>处理中...</span>';
            
            // 提交
            fetch('/api/change_password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('input[name="csrf_token"]').value
                },
                body: JSON.stringify({
                    current_password: currentPassword,
                    new_password: newPassword
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showToast('密码修改成功', 'success');
                    setTimeout(() => {
                        document.getElementById('passwordForm').reset();
                    }, 1000);
                } else {
                    showToast(data.message || '密码修改失败', 'error');
                }
            })
            .catch(error => {
                console.error('修改密码失败:', error);
                showToast('修改失败，请重试', 'error');
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="ph ph-check"></i><span>确认修改</span>';
            });
            
            return false;
        }
        
        // 退出登录
        function handleLogout() {
            if (!confirm('确定要退出登录吗？')) return;
            
            fetch('/logout', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': document.querySelector('input[name="csrf_token"]').value
                }
            })
            .then(() => {
                window.location.href = '/login';
            })
            .catch(error => {
                console.error('退出失败:', error);
                window.location.href = '/login';
            });
        }
    </script>
</body>
</html>
